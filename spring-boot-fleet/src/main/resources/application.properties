# ============================================
# Fleet Monitor System - Configuracion
# ============================================

# Nombre de la aplicacion
spring.application.name=fleet-monitor

# Puerto del servidor
server.port=8081

# ── RabbitMQ ──
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin123

# ── H2 Database ──
spring.datasource.url=jdbc:h2:mem:fleetdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Consola H2 (accesible en http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Jackson (JSON) ──
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Logging ──
logging.level.com.fleet.monitor=INFO
logging.level.org.springframework.amqp=INFO
